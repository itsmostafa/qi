name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release

  build-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            binary: qi-darwin-amd64
            archive: qi-darwin-amd64.tar.gz
          - goos: darwin
            goarch: arm64
            binary: qi-darwin-arm64
            archive: qi-darwin-arm64.tar.gz
          - goos: linux
            goarch: amd64
            binary: qi-linux-amd64
            archive: qi-linux-amd64.tar.gz
          - goos: linux
            goarch: arm64
            binary: qi-linux-arm64
            archive: qi-linux-arm64.tar.gz
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          COMMIT="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X github.com/itsmostafa/qi/internal/version.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X github.com/itsmostafa/qi/internal/version.Commit=${COMMIT}"
          LDFLAGS="${LDFLAGS} -X github.com/itsmostafa/qi/internal/version.BuildDate=${BUILD_DATE}"
          go build -ldflags="${LDFLAGS}" -o qi .
          tar -czf ${{ matrix.archive }} qi LICENSE
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          retention-days: 1

  upload-release-assets:
    needs: [release-please, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: artifacts
      - name: Generate checksums and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          cd artifacts
          # Generate checksums
          find . -name "*.tar.gz" -exec sha256sum {} \; | sed 's|./[^/]*/||g' > SHA256SUMS.txt
          cat SHA256SUMS.txt
          # Upload archives
          for dir in */; do
            for file in "$dir"*.tar.gz; do
              [ -f "$file" ] && gh release upload "$TAG" "$file" --clobber --repo ${{ github.repository }}
            done
          done
          gh release upload "$TAG" SHA256SUMS.txt --clobber --repo ${{ github.repository }}

  verify-release:
    needs: [release-please, upload-release-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Verify assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' --repo ${{ github.repository }})
          for asset in qi-darwin-amd64.tar.gz qi-darwin-arm64.tar.gz qi-linux-amd64.tar.gz qi-linux-arm64.tar.gz SHA256SUMS.txt; do
            echo "$ASSETS" | grep -q "^${asset}$" && echo "✓ $asset" || { echo "✗ Missing: $asset"; exit 1; }
          done

  update-homebrew-tap:
    needs: [release-please, upload-release-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256SUMS from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          gh release download "$TAG" --pattern "SHA256SUMS.txt" --repo ${{ github.repository }}

      - name: Extract SHA256 values
        id: sha256
        run: |
          DARWIN_AMD64=$(grep "qi-darwin-amd64.tar.gz" SHA256SUMS.txt | awk '{print $1}')
          DARWIN_ARM64=$(grep "qi-darwin-arm64.tar.gz" SHA256SUMS.txt | awk '{print $1}')
          LINUX_AMD64=$(grep  "qi-linux-amd64.tar.gz"  SHA256SUMS.txt | awk '{print $1}')
          LINUX_ARM64=$(grep  "qi-linux-arm64.tar.gz"  SHA256SUMS.txt | awk '{print $1}')
          echo "darwin_amd64=${DARWIN_AMD64}" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=${DARWIN_ARM64}" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=${LINUX_AMD64}"   >> "$GITHUB_OUTPUT"
          echo "linux_arm64=${LINUX_ARM64}"   >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-qi tap
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: itsmostafa/homebrew-qi
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-qi

      - name: Update formula
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          FORMULA="homebrew-qi/Formula/qi.rb"

          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" "$FORMULA"

          # Match URL line, advance to next line (sha256), replace hash
          sed -i "/qi-darwin-arm64\.tar\.gz/{n; s/sha256 \".*\"/sha256 \"${{ steps.sha256.outputs.darwin_arm64 }}\"/;}" "$FORMULA"
          sed -i "/qi-darwin-amd64\.tar\.gz/{n; s/sha256 \".*\"/sha256 \"${{ steps.sha256.outputs.darwin_amd64 }}\"/;}" "$FORMULA"
          sed -i "/qi-linux-arm64\.tar\.gz/{n;  s/sha256 \".*\"/sha256 \"${{ steps.sha256.outputs.linux_arm64 }}\"/;}"  "$FORMULA"
          sed -i "/qi-linux-amd64\.tar\.gz/{n;  s/sha256 \".*\"/sha256 \"${{ steps.sha256.outputs.linux_amd64 }}\"/;}"  "$FORMULA"

          cat "$FORMULA"

      - name: Commit and push
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          cd homebrew-qi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/qi.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update qi formula to ${VERSION}"
          git push
